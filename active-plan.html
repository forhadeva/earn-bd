<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>EarnBD - একটিভ প্ল্যান</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    .timer-box {
      background: var(--b50);
      border: 1.5px solid var(--b100);
      border-radius: 14px;
      padding: 12px;
      text-align: center;
      margin: 15px 0;
    }
    .timer-val {
      font-family: 'Baloo Da 2', cursive;
      font-size: 24px;
      font-weight: 800;
      color: var(--b700);
    }
    .timer-lbl {
      font-size: 11px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tbar-logo">Earn<span>BD</span></div>
    <div class="tbar-right">
      <div class="tbar-bal">৳<span id="hBal">0</span></div>
      <div class="tbar-avatar" id="avt" onclick="window.location.href='profile.html'">U</div>
    </div>
  </div>

  <div class="page">
    <div class="ph">
      <div class="ph-title">আপনার একটিভ প্ল্যান</div>
      <div class="ph-sub">এখান থেকে আপনার দৈনিক ইনকাম সংগ্রহ করুন</div>
    </div>

    <div id="activePlansContainer">
      <div class="card" style="text-align:center; padding:40px 20px;">
        <div style="font-size:40px; margin-bottom:10px;">📦</div>
        <div style="color:var(--t3);">লোডিং হচ্ছে...</div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bnav">
    <a href="dashboard.html" class="bnav-item">
      <div class="bnav-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      হোম
    </a>
    <a href="plans.html" class="bnav-item">
      <div class="bnav-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
      প্ল্যান
    </a>
    <a href="refer.html" class="bnav-item">
      <div class="bnav-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg></div>
      রেফার
    </a>
    <a href="withdraw.html" class="bnav-item">
      <div class="bnav-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
      Withdraw
    </a>
    <a href="profile.html" class="bnav-item">
      <div class="bnav-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      প্রোফাইল
    </a>
  </div>

  <div id="toast"></div>

  <script src="script.js"></script>
  <script>
    let timerInterval;

    function startCountdown() {
      if(timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(updateTimers, 1000);
    }

    function updateTimers() {
      const timerEls = document.querySelectorAll('.timer-val');
      if(timerEls.length === 0) return;

      const now = new Date();
      let last;
      if (S.user && S.user.last_collect) {
        if (S.user.last_collect.seconds) last = new Date(S.user.last_collect.seconds * 1000);
        else if (S.user.last_collect.toDate) last = S.user.last_collect.toDate();
        else last = new Date(S.user.last_collect);
      }

      const nextCollect = last ? new Date(last.getTime() + 24 * 60 * 60 * 1000) : new Date(0);
      const diff = nextCollect - now;

      const btn = document.getElementById('collectBtnMain');
      if (diff <= 0) {
        timerEls.forEach(el => el.textContent = "00:00:00");
        if (btn && btn.classList.contains('disabled')) {
           renderActivePlans(); 
        }
      } else {
        const h = Math.floor(diff / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);
        const timeStr = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        timerEls.forEach(el => el.textContent = timeStr);
      }
    }

    async function renderActivePlans() {
      const cont = document.getElementById('activePlansContainer');
      if (!S.user) return;

      const plans = S.user.active_plans || [];
      const legacyPlan = S.user.plan;

      if (plans.length === 0 && !legacyPlan) {
        cont.innerHTML = `
          <div class="card" style="text-align:center; padding:40px 20px;">
            <div style="font-size:40px; margin-bottom:10px;">📦</div>
            <div style="font-weight:700; color:var(--text);">কোনো একটিভ প্ল্যান নেই</div>
            <div style="font-size:13px; color:var(--t3); margin-top:5px;">ইনকাম শুরু করতে একটি প্ল্যান কিনুন</div>
            <a href="plans.html" class="btn btn-primary" style="margin-top:20px;">প্ল্যান দেখুন →</a>
          </div>
        `;
        return;
      }

      const isCollected = !canCollect();
      let totalDaily = S.user.plan_daily || 0;
      
      let html = '';
      const now = new Date();
      
      if (plans.length > 0) {
        plans.forEach((p, idx) => {
          let expDate, startDate;
          if (p.expires?.seconds) expDate = new Date(p.expires.seconds * 1000);
          else if (p.expires?.toDate) expDate = p.expires.toDate();
          else expDate = new Date(p.expires || Date.now());

          if (p.start?.seconds) startDate = new Date(p.start.seconds * 1000);
          else if (p.start?.toDate) startDate = p.start.toDate();
          else startDate = new Date(p.start || Date.now());
          
          const totalDays = p.days || 10;
          let daysLeft = p.rem !== undefined ? p.rem : totalDays;

          html += `
            <div class="card" style="margin-bottom:12px; padding:16px;">
              <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                 <div>
                    <div style="font-size:11px; color:var(--t3); text-transform:uppercase; letter-spacing:0.5px;">সক্রিয় প্ল্যান #${idx+1}</div>
                    <div style="font-size:20px; font-weight:900; color:var(--b700); line-height:1.2; font-family:'Baloo Da 2';">${p.name}</div>
                    <div class="badge badge-green" style="margin-top:6px;">⏳ ${daysLeft} / ${totalDays} দিন বাকি</div>
                 </div>
                 <div style="text-align:right;">
                    <div style="font-size:11px; color:var(--t3);">দৈনিক আয়</div>
                    <div style="font-size:18px; font-weight:800; color:var(--green);">৳${p.daily}</div>
                 </div>
              </div>

              <div style="margin-top:16px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div style="background:var(--b50); padding:10px; border-radius:12px; border:1px solid var(--b100);">
                  <div style="font-size:10px; color:var(--t3); margin-bottom:4px;">শুরু হয়েছে</div>
                  <div style="font-size:13px; font-weight:700;">${startDate.toLocaleDateString('bn-BD')}</div>
                </div>
                <div style="background:var(--b50); padding:10px; border-radius:12px; border:1px solid var(--b100);">
                  <div style="font-size:10px; color:var(--t3); margin-bottom:4px;">মেয়াদ শেষ</div>
                  <div style="font-size:13px; font-weight:700; color:var(--red);">${expDate.toLocaleDateString('bn-BD')}</div>
                </div>
              </div>
            </div>
          `;
        });
      } else if (legacyPlan) {
        html = `
          <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
               <div>
                  <div style="font-size:11px; color:var(--t3);">বর্তমান প্ল্যান</div>
                  <div style="font-size:22px; font-weight:900; color:var(--b700); line-height:1.2; font-family:'Baloo Da 2';">${legacyPlan}</div>
                  <div class="badge badge-red" style="margin-top:6px;">⏳ সিস্টেম আপডেট হচ্ছে...</div>
               </div>
               <div style="text-align:right;">
                  <div style="font-size:11px; color:var(--t3);">দৈনিক আয়</div>
                  <div style="font-size:20px; font-weight:800; color:var(--green);">৳${totalDaily}</div>
               </div>
            </div>
            <div style="margin-top:15px; background:var(--b50); padding:12px; border-radius:12px; text-align:center; border:1px solid var(--b100);">
               <div style="font-size:12px; color:var(--t3);">সিস্টেম আপডেট শেষ হলে সঠিক মেয়াদ দেখতে পাবেন।</div>
            </div>
          </div>
        `;
      }

      html += `
        <div class="card" style="background:var(--white); border:2px solid var(--b100); margin-top:20px; padding:20px; border-radius:24px; text-align:center;">
          <div style="margin-bottom:15px;">
            <div style="font-size:13px; color:var(--t3);">আজকের মোট আয়</div>
            <div style="font-size:32px; font-weight:900; color:var(--green); font-family:'Baloo Da 2', cursive;">৳${totalDaily}</div>
          </div>

          <div class="timer-box">
             <div class="timer-lbl">${isCollected ? 'পরবর্তী কালেকশন' : 'কালেকশন এখন চালু'}</div>
             <div class="timer-val">00:00:00</div>
          </div>

          <button id="collectBtnMain" onclick="handleCollect()" class="btn btn-primary" style="width:100%; height:auto; padding:16px; border-radius:16px;" ${isCollected ? 'disabled' : ''}>
            ${isCollected ? '✅ ইনকাম সংগ্রহীত' : '💰 টাকা সংগ্রহ করুন →'}
          </button>
          
          <div style="font-size:11px; color:var(--t3); text-align:center; margin-top:15px; line-height:1.4;">
            প্রতিদিন একবার এখানে এসে আপনার সকল একটিভ প্ল্যানের ইনকাম সংগ্রহ করুন।
          </div>
        </div>
      `;

      cont.innerHTML = html;
      startCountdown();
    }

    async function handleCollect() {
      await collectDaily();
    }

    const originalUpdateUI = updateUI;
    updateUI = function() {
      originalUpdateUI();
      renderActivePlans();
    }

    if (S.user) renderActivePlans();
    checkAuth(true);
  </script>
</body>
</html>
