<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>EarnBD - Coin Flip</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    .coin {
      width: 150px;
      height: 150px;
      margin: 30px auto;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1s ease-in-out;
    }
    .coin div {
      width: 100%;
      height: 100%;
      position: absolute;
      border-radius: 50%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.2), 0 10px 30px rgba(0,0,0,0.1);
      border: 5px solid #ffd700;
    }
    .heads { background: linear-gradient(135deg, #ffd700, #ffcc00); }
    .tails { background: linear-gradient(135deg, #c0c0c0, #e0e0e0); border-color: #c0c0c0 !important; transform: rotateY(180deg); }
    
    @keyframes flipHeads { from { transform: rotateY(0); } to { transform: rotateY(1800deg); } }
    @keyframes flipTails { from { transform: rotateY(0); } to { transform: rotateY(1980deg); } }
    
    .flipping-heads { animation: flipHeads 1s forwards; }
    .flipping-tails { animation: flipTails 1s forwards; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="tbar-logo" onclick="window.location.href='dashboard.html'" style="cursor:pointer;">Earn<span>BD</span></div>
    <div class="tbar-right">
      <div class="tbar-bal">৳<span id="hBal">0</span></div>
      <div class="tbar-avatar" id="avt">U</div>
    </div>
  </div>

  <div class="page">
    <div class="ph" style="display:flex; align-items:center; gap:15px;">
      <div onclick="window.location.href='games.html'" style="width:36px; height:36px; border-radius:10px; background:#fff; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer;">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
      </div>
      <div>
        <div class="ph-title">Coin Flip</div>
        <div class="ph-sub">মাথা না লেজ? সঠিক হলে জিতুন!</div>
      </div>
    </div>

    <div class="card" style="text-align:center; padding:30px 20px;">
      <div class="coin" id="coin">
        <div class="heads" style="font-size:24px; font-weight:800; color:#b45309;">HEADS</div>
        <div class="tails" style="font-size:24px; font-weight:800; color:#4b5563;">TAILS</div>
      </div>

      <div id="status" style="font-weight:700; font-size:16px; margin:20px 0; color:var(--t3);">আপনার পক্ষ বেছে নিন:</div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
        <button onclick="playFlip('heads')" class="btn" style="background:var(--b50); color:var(--b700); border:1px solid var(--b100);">Heads (মাথা)</button>
        <button onclick="playFlip('tails')" class="btn" style="background:var(--b50); color:var(--b700); border:1px solid var(--b100);">Tails (লেজ)</button>
      </div>

      <div style="margin-top:25px; padding:15px; background:var(--b50); border-radius:12px; font-size:12px; color:var(--t3);">
        জিতলে পাবেন ৳১ বোনাস!
      </div>

      <!-- Ad Reset Section -->
      <div id="adResetSec" style="display:none; margin-top:20px; padding:15px; border:2px dashed var(--b200); border-radius:16px; background:#fff;">
        <div style="font-size:13px; font-weight:700; color:var(--text); margin-bottom:10px;">লিমিট শেষ? এই অ্যাডে ক্লিক করে লিমিট রিসেট করুন!</div>
        <div onclick="resetGameLimit('flip')" style="width:100%; min-height:120px; background:linear-gradient(45deg, #f3f4f6, #e5e7eb); border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden; position:relative; border: 1px solid var(--border);">
          <div style="text-align:center;">
             <div style="font-size:24px; margin-bottom:5px;">🎁</div>
             <div style="font-size:11px; font-weight:700; color:var(--b700);">অ্যাড লোড হচ্ছে / ক্লিক করুন</div>
          </div>
          <div style="position:absolute; bottom:5px; right:5px; background:rgba(0,0,0,0.5); color:#fff; padding:2px 6px; border-radius:4px; font-size:9px; z-index:10;">Ad</div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    checkAuth();
    let isFlipping = false;

    // Check limit on load
    window.onload = () => {
      setTimeout(() => {
        if(!canPlay('flip')) {
          document.getElementById('status').innerHTML = `<span style="color:var(--red)">⏳ আজকের লিমিট শেষ!</span>`;
          document.querySelectorAll('.card button:not(.btn-primary)').forEach(b => b.disabled = true);
          document.getElementById('adResetSec').style.display = 'block';
        }
      }, 1000);
    };

    async function playFlip(choice) {
      if(isFlipping) return;
      if(!canPlay('flip')) {
        toast("⏳ আজকের লিমিট শেষ!");
        return;
      }

      isFlipping = true;
      const coin = document.getElementById('coin');
      const status = document.getElementById('status');
      
      coin.className = 'coin'; // reset
      status.textContent = 'কয়েন ঘুরছে...';
      
      const result = Math.random() < 0.5 ? 'heads' : 'tails';
      
      setTimeout(() => {
        coin.classList.add(result === 'heads' ? 'flipping-heads' : 'flipping-tails');
      }, 10);

      setTimeout(async () => {
        isFlipping = false;
        if(choice === result) {
          status.innerHTML = `<span style="color:var(--green)">✅ আপনি জিতেছেন!</span>`;
          const success = await rewardGame(1, 'flip');
          if(success) {
            toast("🎉 আপনি ৳১ জিতেছেন!");
            setTimeout(() => window.location.reload(), 2000);
          }
        } else {
          status.innerHTML = `<span style="color:var(--red)">❌ আপনি হেরেছেন!</span>`;
          // Mark as played even if lost
          await rewardGame(0, 'flip');
          setTimeout(() => window.location.reload(), 2000);
        }
      }, 1100);
    }
  </script>
</body>
</html>
