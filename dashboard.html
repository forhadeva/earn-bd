<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>EarnBD - ড্যাশবোর্ড</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://quge5.com/88/tag.min.js" data-zone="237738" async data-cfasync="false"></script>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tbar-logo">Earn<span>BD</span></div>
    <div class="tbar-right">
      <div class="tbar-bal">৳<span id="hBal">0</span></div>
      <div class="tbar-avatar" id="avt" onclick="window.location.href='profile.html'">U</div>
    </div>
  </div>

  <div class="page">
    <div class="hero">
      <div class="hero-grid"></div><div class="hero-orb"></div>
      <div class="hero-lbl">মোট ব্যালেন্স</div>
      <div class="hero-amt"><sup>৳</sup><span id="hBalLarge">0</span></div>
      <div class="hero-sub">আজকের আয়: ৳<span id="hToday">0</span></div>
      <div class="hero-pills">
        <div class="hero-pill"><div class="hero-pill-l">রেফার আয়</div><div class="hero-pill-v">৳<span id="hRef">0</span></div></div>
        <div class="hero-pill"><div class="hero-pill-l">প্ল্যান আয়</div><div class="hero-pill-v">৳<span id="hPlan">0</span></div></div>
        <div class="hero-pill"><div class="hero-pill-l">উত্তোলন</div><div class="hero-pill-v">৳<span id="hWd">0</span></div></div>
      </div>
    </div>

    <div class="sg">
      <div class="sc"><div class="sc-ico" style="background:var(--b50);">👥</div><div class="sc-num" id="sRef">0</div><div class="sc-lbl">মোট রেফার</div></div>
      <div class="sc">
        <div class="sc-ico" style="background:var(--g3);">📦</div>
        <div class="sc-num" style="font-size:15px;" id="sPlanName">নেই</div>
        <div class="sc-lbl">চলতি প্ল্যান</div>
        <div id="sPlanAction" style="margin-top:8px;"></div>
      </div>
      <div class="sc"><div class="sc-ico" style="background:#fffbeb;">📅</div><div class="sc-num" id="sDays">০</div><div class="sc-lbl">বাকি দিন</div></div>
      <div class="sc"><div class="sc-ico" style="background:var(--r2);">💸</div><div class="sc-num" id="sWdCnt">0</div><div class="sc-lbl">Withdraw সংখ্যা</div></div>
    </div>

    <!-- Earn More Section -->
    <div style="margin-top: 30px; text-align: center;">
      <div style="font-family: 'Baloo Da 2', cursive; font-size: 20px; font-weight: 800; color: var(--b700); display: inline-block; border-bottom: 3px solid var(--b700); padding-bottom: 5px; margin-bottom: 20px;">
        আরও আয় করুন
      </div>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="sc" onclick="window.location.href='video.html'" style="padding: 20px 10px; cursor: pointer;">
          <div class="sc-ico" style="background: #fee2e2; color: #ef4444; font-size: 24px;">🎬</div>
          <div style="font-weight: 800; font-size: 14px; color: var(--text);">ভিডিও দেখে আয়</div>
          <div style="font-size: 10px; color: var(--t3); margin-top: 4px;">প্রতি ভিডিও ৳১ - ৳৫</div>
        </div>
        <div class="sc" onclick="window.location.href='games.html'" style="padding: 20px 10px; cursor: pointer;">
          <div class="sc-ico" style="background: #fef3c7; color: #d97706; font-size: 24px;">🎮</div>
          <div style="font-weight: 800; font-size: 14px; color: var(--text);">গেম খেলে আয়</div>
          <div style="font-size: 10px; color: var(--t3); margin-top: 4px;">আনলিমিটেড ইনকাম</div>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bnav">
    <a href="dashboard.html" class="bnav-item on">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      হোম
    </a>
    <a href="plans.html" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
      প্ল্যান
    </a>
    <a href="task.html" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
      টাস্ক
    </a>
    <a href="refer.html" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg></div>
      রেফার
    </a>
    <a href="withdraw.html" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
      উত্তোলন
    </a>
    <a href="profile.html" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      প্রোফাইল
    </a>
  </div>

  <div id="toast"></div>

  <script src="script.js"></script>
  <script>
    checkAuth();
    
    // Sync hBalLarge
    const observer = new MutationObserver(() => {
      const hBal = document.getElementById('hBal');
      const hBalLarge = document.getElementById('hBalLarge');
      if (hBal && hBalLarge) hBalLarge.innerText = hBal.innerText;
    });
    observer.observe(document.getElementById('hBal'), { childList: true, characterData: true, subtree: true });

    // Handle Plan Action
    const oldUpdateUI = updateUI;
    updateUI = function() {
      oldUpdateUI();
      const planAction = document.getElementById('sPlanAction');
      if (S.user && (S.user.plan || (S.user.active_plans && S.user.active_plans.length > 0))) {
        planAction.innerHTML = `<a href="task.html" style="font-size:11px; font-weight:800; color:var(--b700); text-decoration:none;">🚀 টাস্ক সম্পন্ন করুন →</a>`;
      } else {
        planAction.innerHTML = `<a href="plans.html" style="font-size:11px; font-weight:800; color:var(--green); text-decoration:none;">🛍️ প্ল্যান কিনুন →</a>`;
      }
    }
  </script>
</body>
</html>
