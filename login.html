<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>EarnBD - লগইন</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

  <div class="auth-bg">
    <div class="auth-grid"></div>
    <div class="auth-orb1"></div>
    <div class="auth-orb2"></div>
    
    <div class="auth-logo">Earn<span>BD</span><span class="auth-logo-dot"></span></div>
    <div class="auth-tagline">বিনিয়োগ করুন — প্রতিদিন আয় করুন</div>
    
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab on">লগইন</button>
        <button class="auth-tab" onclick="location.href='signup.html'">রেজিস্টার</button>
      </div>
      
      <div id="loginForm">
        <div class="field">
          <label>মোবাইল নম্বর</label>
          <input type="tel" placeholder="01XXXXXXXXX" id="lPhone">
        </div>
        <div class="field">
          <label>পাসওয়ার্ড</label>
          <input type="password" placeholder="পাসওয়ার্ড" id="lPass">
        </div>
        
        <button class="btn-auth" style="margin-bottom:16px;" onclick="doLogin()">লগইন করুন →</button>

        <div style="display:flex;align-items:center;margin:10px 0 20px;gap:10px;">
          <div style="flex:1;height:1px;background:var(--border);"></div>
          <div style="font-size:12px;color:var(--t3);font-weight:600;">অথবা</div>
          <div style="flex:1;height:1px;background:var(--border);"></div>
        </div>

        <button class="btn" style="background:#fff;border:1.5px solid var(--border);color:var(--t2);gap:10px;height:50px;" onclick="doGoogleLogin()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
          Google দিয়ে লগইন করুন
        </button>

        <div style="text-align:center; margin-top:20px;">
          <a href="dashboard.html" style="font-size:14px; color:var(--b700); font-weight:800; text-decoration:none; padding: 10px 20px; border: 1.5px dashed var(--b100); border-radius: 12px; display: inline-block;">লগইন ছাড়াই ভিজিট করুন →</a>
        </div>

        <p style="text-align:center;font-size:13px;margin-top:24px;color:var(--t3);">
          একাউন্ট নেই? <a href="signup.html" style="color:var(--b700);font-weight:800;text-decoration:none;">নতুন খুলুন</a>
        </p>
      </div>
    </div>
    
    <div style="margin-top:16px;font-size:12px;color:rgba(255,255,255,.3);text-align:center;">© 2025 EarnBD</div>
  </div>

  <div id="toast"></div>

  <script src="script.js"></script>
  <script>
    checkAuth(false);

    async function doLogin(){
      const phone = document.getElementById('lPhone').value;
      const password = document.getElementById('lPass').value;
      if(!phone || !password){toast('⚠️ সব তথ্য দিন'); return;}
      
      const email = phone + '@earnbd.com';
      try {
        await auth.signInWithEmailAndPassword(email, password);
        toast('✅ লগইন সফল!');
      } catch(e) {
        toast('❌ ভুল ফোন বা পাসওয়ার্ড');
      }
    }
  </script>
</body>
</html>
