<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>EarnBD - লগইন</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

  <div class="auth-bg">
    <div class="auth-grid"></div>
    <div class="auth-orb1"></div>
    <div class="auth-orb2"></div>
    
    <div class="auth-logo">Earn<span>BD</span><span class="auth-logo-dot"></span></div>
    
    <div class="auth-card" style="text-align:center; padding: 40px 20px;">
      <div id="tg-loading">
        <div class="loader-tg"></div>
        <h3 style="margin-top:20px; color:var(--text); font-family:'Baloo Da 2', cursive;">অটোমেটিক লগইন হচ্ছে...</h3>
        <p style="font-size:13px; color:var(--t3); margin-top:8px;">অনুগ্রহ করে কিছুক্ষণ অপেক্ষা করুন</p>
      </div>

      <div id="non-tg" style="display:none;">
        <h3 style="color:var(--text); font-family:'Baloo Da 2', cursive;">টেলিগ্রাম থেকে প্রবেশ করুন</h3>
        <p style="font-size:13px; color:var(--t3); margin-top:8px;">এই অ্যাপটি শুধুমাত্র টেলিগ্রাম বটের মাধ্যমে ব্যবহার করা যাবে।</p>
        <a href="https://t.me/EarnBD_Bot" class="btn-auth" style="margin-top:20px; text-decoration:none; display:inline-flex; align-items:center; justify-content:center;">বটে যান →</a>
      </div>
    </div>
    
    <div style="margin-top:16px;font-size:12px;color:rgba(255,255,255,.3);text-align:center;">© 2025 EarnBD</div>
  </div>

  <style>
    .loader-tg {
      width: 48px;
      height: 48px;
      border: 5px solid #FFF;
      border-bottom-color: var(--b700);
      border-radius: 50%;
      display: inline-block;
      box-sizing: border-box;
      animation: rotation 1s linear infinite;
    }
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

  <script src="script.js"></script>
  <script>
    if (!window.isTelegram) {
      document.getElementById('tg-loading').style.display = 'none';
      document.getElementById('non-tg').style.display = 'block';
    } else {
      // checkAuth will handle the redirect to dashboard once logged in
      checkAuth(false);
    }
  </script>
</body>
</html>
