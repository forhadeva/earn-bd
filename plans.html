<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>EarnBD - প্ল্যান</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tbar-logo">Earn<span>BD</span></div>
    <div class="tbar-right">
      <div class="tbar-bal">৳<span id="hBal">0</span></div>
      <div class="tbar-avatar" id="avt" onclick="window.location.href='profile.html'">U</div>
    </div>
  </div>

  <div class="page">
    <div class="ph">
      <div class="ph-title">প্ল্যান বেছে নিন</div>
      <div class="ph-sub">বিনিয়োগ করুন — প্রতিদিন আয় করুন</div>
    </div>

    <div id="planListContainer">
      <!-- Loading placeholders or instant content -->
      <div class="card" style="text-align:center;padding:40px;">
        <div style="font-size:32px;margin-bottom:10px;">📦</div>
        <div style="color:var(--t3);">প্ল্যান লোড হচ্ছে...</div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bnav">
    <div onclick="window.location.href='dashboard.html'" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      হোম
    </div>
    <div onclick="window.location.href='plans.html'" class="bnav-item on">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
      প্ল্যান
    </div>
    <div onclick="window.location.href='task.html'" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
      টাস্ক
    </div>
    <div onclick="window.location.href='refer.html'" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg></div>
      রেফার
    </div>
    <div onclick="window.location.href='withdraw.html'" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
      উত্তোলন
    </div>
    <div onclick="window.location.href='profile.html'" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      প্রোফাইল
    </div>
  </div>

  <div id="toast"></div>

  <script src="script.js"></script>
  <script>
    checkAuth();

    async function renderPlans(){
      const cont = document.getElementById('planListContainer');
      if(!cont) return;

      const cached = localStorage.getItem('eb_plans_cache');
      if(cached) renderPlanHTML(JSON.parse(cached));

      try {
        const snap = await db.collection('plans').orderBy('name').get();
        if(!snap.empty) {
          const plans = snap.docs.map(doc => doc.data());
          localStorage.setItem('eb_plans_cache', JSON.stringify(plans));
          renderPlanHTML(plans);
        }
      } catch(e) { console.error(e); }
    }

    function renderPlanHTML(plans) {
      const cont = document.getElementById('planListContainer');
      cont.innerHTML = plans.map((p, i) => {
        const profit = (p.daily * p.days) - p.price;
        const chips = ['⭐ জনপ্রিয়', '💎 সর্বোচ্চ আয়', '🔥 সেরা অফার'];
        const chip = chips[i % chips.length];
        
        return `
          <div class="plan-card" onclick="buyPlan('${p.name}', ${p.price}, ${p.daily}, ${p.days})">
            <div class="plan-blob"></div>
            <div class="plan-chip">${chip}</div>
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
              <div>
                <div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;">${p.name}</div>
                <div class="plan-price">৳${p.price}</div>
                <div style="font-size:12px;color:var(--t3);margin-top:2px;">বিনিয়োগ</div>
              </div>
              <div style="text-align:right;">
                <div style="font-size:10px;color:var(--t3);margin-bottom:3px;">মোট আয়</div>
                <div style="font-family:'Baloo Da 2',cursive;font-size:22px;font-weight:800;color:var(--b700);">৳${p.daily * p.days}</div>
                <div class="plan-profit">▲ ৳${profit} লাভ</div>
              </div>
            </div>
            
            <div class="plan-stats">
              <div class="plan-stat">
                <div class="plan-stat-l">দৈনিক আয়</div>
                <div class="plan-stat-v" style="color:var(--b700);">৳${p.daily}</div>
              </div>
              <div class="plan-stat">
                <div class="plan-stat-l">মেয়াদ</div>
                <div class="plan-stat-v">${p.days} দিন</div>
              </div>
            </div>

            <button class="btn btn-primary">কিনুন →</button>
          </div>
        `;
      }).join('');
    }

    async function buyPlan(name, price, daily, days){
      if(!auth.currentUser) return;
      if((S.user.bal || 0) < price) {toast('❌ পর্যাপ্ত ব্যালেন্স নেই! ডিপোজিট করুন।'); return;}

      const ok = await confirmModal('নিশ্চিত করুন', `আপনি কি ${name} কিনতে চান? <br> দাম: ৳${price} | মেয়াদ: ${days} দিন`);
      if(!ok) return;

      try {
        const userRef = db.collection('users').doc(auth.currentUser.uid);
        const newPlan = {
          name, daily, days, rem: days,
          start: new Date(),
          expires: new Date(Date.now() + days * 24 * 60 * 60 * 1000)
        };

        await userRef.update({
          bal: S.user.bal - price,
          active_plans: firebase.firestore.FieldValue.arrayUnion(newPlan),
          plan: name,
          plan_daily: (S.user.plan_daily || 0) + daily
        });

        // Show Success Modal Instantly
        alertModal('🎉 অভিনন্দন!', `আপনার <b>${name}</b> কেনা সফল হয়েছে।`).then(() => {
          window.location.href = 'dashboard.html';
        });

        // Handle Secondary Tasks in Background (with better error handling)
        (async () => {
          try {
            // Handle Referral Commission (Optimized for both Code and Phone)
            if (S.user.referred_by) {
              const bonus = Math.floor(price * 0.1);
              const refVal = S.user.referred_by.trim();
              
              // 1. Try finding by Referral Code (e.g., EB-123456)
              let refSnap = await db.collection('users').where('ref_code', '==', refVal).get();
              
              // 2. If not found, try finding by Phone
              if (refSnap.empty) {
                refSnap = await db.collection('users').where('phone', '==', refVal).get();
              }
              
              // 3. Try phone variations (with/without leading zero)
              if (refSnap.empty) {
                let alt = refVal.startsWith('0') ? refVal.substring(1) : ('0' + refVal);
                refSnap = await db.collection('users').where('phone', '==', alt).get();
              }

              if (!refSnap.empty) {
                const r = refSnap.docs[0];
                await r.ref.update({
                  bal: firebase.firestore.FieldValue.increment(bonus),
                  refEarn: firebase.firestore.FieldValue.increment(bonus)
                });
                await db.collection('history').add({
                  uid: r.id, type: 'history', type_sub: 'refer', amt: bonus,
                  msg: `রেফার কমিশন (${S.user.name})`,
                  date: new Date().toLocaleString('bn-BD'),
                  timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
              }
            }

            await db.collection('orders').add({
              uid: auth.currentUser.uid, name: S.user.name, plan: name, amt: price,
              date: new Date().toLocaleString('bn-BD')
            });
          } catch(err) {
            console.error("Secondary Task Error:", err);
            toast("⚠️ রেফার কমিশন বা অর্ডার সেভ করতে সমস্যা হয়েছে।");
          }
        })();

      } catch(e) { 
        console.error(e);
        toast('❌ এরর: ' + e.message); 
      }
    }

    renderPlans();
  </script>
</body>
</html>
