<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>EarnBD - রেফার করুন</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://quge5.com/88/tag.min.js" data-zone="237738" async data-cfasync="false"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    .ref-card-premium {
      background: #1e1b4b;
      border-radius: 24px;
      padding: 30px 20px;
      color: #fff;
      position: relative;
      overflow: hidden;
      margin-top: 10px;
      box-shadow: 0 15px 35px rgba(30, 27, 75, 0.2);
    }
    .ref-gift-ico {
      width: 40px; height: 40px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      margin-bottom: 20px;
    }
    .ref-title {
      font-family: 'Baloo Da 2', cursive;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 15px;
    }
    .ref-desc {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
      line-height: 1.6;
      margin-bottom: 25px;
    }
    .ref-desc b { color: #fff; }

    .ref-badge {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 700;
      color: #93c5fd;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 25px;
    }

    .ref-link-box {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 4px;
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
    .ref-link-box input {
      flex: 1;
      background: none;
      border: none;
      padding: 10px 12px;
      color: #cbd5e1;
      font-size: 12px;
      outline: none;
      font-family: monospace;
    }
    .ref-copy-btn-inner {
      width: 36px; height: 36px;
      background: #a855f7;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: #fff;
    }

    .ref-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .ref-action-btn {
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      color: #fff;
      transition: transform 0.2s;
    }
    .ref-action-btn:active { transform: scale(0.97); }
    
    .btn-copy-main { background: linear-gradient(135deg, #7c3aed, #db2777); }
    .btn-share-main { background: linear-gradient(135deg, #6366f1, #a855f7); }

    .ref-list-h {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 35px;
        margin-bottom: 15px;
    }
    .ref-list-h h3 {
        font-size: 18px;
        font-weight: 800;
        color: #1e293b;
        font-family: 'Baloo Da 2';
    }
    .total-badge {
        background: #dbeafe;
        color: #1e40af;
        padding: 4px 12px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 800;
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tbar-logo" onclick="window.location.href='dashboard.html'" style="cursor:pointer;">Earn<span>BD</span></div>
    <div class="tbar-right">
      <div class="tbar-bal">৳<span id="hBal">0</span></div>
      <div class="tbar-avatar" id="avt" onclick="window.location.href='profile.html'">U</div>
    </div>
  </div>

  <div class="page">
    <div class="ref-card-premium">
      <div class="ref-gift-ico">🎁</div>
      <div class="ref-title">বন্ধুকে রেফার করুন এবং আয় করুন</div>
      <div class="ref-desc">
        আপনার রেফার লিংকটি শেয়ার করুন এবং আপনার বন্ধুদের আমন্ত্রণ করুন। আপনার বন্ধু সাইন আপ করলে আপনি <b>100.00 TAKA</b> বোনাস পাবেন।
      </div>

      <div class="ref-badge">
        😊 প্রতি রেফারে 100.00 TAKA বোনাস
      </div>

      <div class="ref-link-box">
        <input id="refLink" type="text" readonly value="লোড হচ্ছে...">
        <div class="ref-copy-btn-inner" onclick="copyRef()">
            <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </div>
      </div>

      <div class="ref-btns">
        <button class="ref-action-btn btn-copy-main" onclick="copyRef()">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            লিঙ্ক কপি করুন
        </button>
        <button class="ref-action-btn btn-share-main" onclick="shareRef()">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
            শেয়ার করুন
        </button>
      </div>
    </div>

    <div class="ref-list-h">
        <h3>রেফার করা বন্ধুদের তালিকা</h3>
        <div class="total-badge">মোট: <span id="rTotal">0</span></div>
    </div>

    <div id="refTable">
        <div class="card" style="padding:40px; text-align:center;">
            <div style="font-size:40px; margin-bottom:15px; opacity:0.3;">👥</div>
            <div style="color:#94a3b8; font-size:13px;">এখনো কোনো রেফার নেই</div>
        </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bnav">
    <div onclick="window.location.href='dashboard.html'" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
      হোম
    </div>
    <div onclick="window.location.href='task.html'" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
      টাস্ক
    </div>
    <div onclick="window.location.href='refer.html'" class="bnav-item on">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg></div>
      রেফার
    </div>
    <div onclick="window.location.href='withdraw.html'" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
      উত্তোলন
    </div>
    <div onclick="window.location.href='profile.html'" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      প্রোফাইল
    </div>
  </div>

  <div id="toast"></div>

  <script src="script.js"></script>
  <script>
    checkAuth();
    
    function updateRefUI() {
        if (!S.user) return;
        const botUser = S.user.tg_id || S.user.uid;
        const link = `https://t.me/EarnBD_Bot?start=${botUser}`;
        document.getElementById('refLink').value = link;
        document.getElementById('rTotal').textContent = S.user.refCount || 0;
        loadReferrals();
    }

    async function loadReferrals() {
        const uid = auth.currentUser.uid;
        const q = await db.collection('users').where('refBy', '==', uid).limit(20).get();
        const table = document.getElementById('refTable');
        if (q.empty) return;

        table.innerHTML = '';
        q.forEach(doc => {
            const d = doc.data();
            const row = document.createElement('div');
            row.className = 'card';
            row.style.padding = '12px 15px';
            row.style.marginBottom = '8px';
            row.style.display = 'flex';
            row.style.alignItems = 'center';
            row.style.gap = '12px';
            row.innerHTML = `
                <div style="width:34px; height:34px; border-radius:50%; background:#f1f5f9; display:flex; align-items:center; justify-content:center; font-weight:800; color:#6366f1; font-size:12px;">${(d.name || 'U')[0].toUpperCase()}</div>
                <div>
                    <div style="font-weight:700; font-size:13px; color:#1e293b;">${d.name || 'User'}</div>
                    <div style="font-size:10px; color:#94a3b8;">Joined: ${d.joinedAt || 'N/A'}</div>
                </div>
            `;
            table.appendChild(row);
        });
    }

    function copyRef() {
        const link = document.getElementById('refLink').value;
        navigator.clipboard.writeText(link).then(() => toast('📋 লিঙ্ক কপি হয়েছে!'));
    }

    function shareRef() {
        const link = document.getElementById('refLink').value;
        const text = `EarnBD-তে জয়েন করুন এবং ইনকাম শুরু করুন! আমার রেফার লিঙ্ক: ${link}`;
        if (navigator.share) {
            navigator.share({ title: 'EarnBD Refer', text, url: link });
        } else {
            window.open(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`);
        }
    }

    const oldUI = updateUI;
    updateUI = function() {
        oldUI();
        updateRefUI();
    }
  </script>
</body>
</html>
