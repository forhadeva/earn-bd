<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>EarnBD - ডেইলি টাস্ক</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    .task-hero {
      background: linear-gradient(135deg, var(--b700), var(--b900));
      padding: 30px 20px;
      border-radius: 24px;
      color: white;
      text-align: center;
      margin-bottom: 25px;
      position: relative;
      overflow: hidden;
    }
    .task-hero::before {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      animation: rotate 10s linear infinite;
    }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .timer-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 18px;
      padding: 15px;
      margin-top: 15px;
    }
    .timer-val {
      font-family: 'Baloo Da 2', cursive;
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    .task-list-h {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .task-item {
      background: white;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: transform 0.2s;
    }
    .task-item:active { transform: scale(0.98); }
    .task-ico {
      width: 44px; height: 44px;
      background: var(--b50);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .collect-btn {
      width: 100%;
      padding: 18px;
      border-radius: 20px;
      background: var(--b700);
      color: white;
      border: none;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(26, 80, 219, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
    }
    .collect-btn:disabled {
      background: #cbd5e1;
      box-shadow: none;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tbar-logo">Earn<span>BD</span></div>
    <div class="tbar-right">
      <div class="tbar-bal">৳<span id="hBal">0</span></div>
      <div class="tbar-avatar" id="avt" onclick="window.location.href='profile.html'">U</div>
    </div>
  </div>

  <div class="page">
    <div class="task-hero">
      <div style="font-size: 14px; opacity: 0.8; margin-bottom: 5px;">আজকের টাস্ক</div>
      <h2 style="font-family: 'Baloo Da 2'; font-weight: 800;">ইনকাম সংগ্রহ করুন</h2>
      
      <div class="timer-card">
        <div id="timerStatus" style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; opacity: 0.9;">কালেকশন সময় বাকি</div>
        <div class="timer-val" id="mainTimer">00:00:00</div>
      </div>
    </div>

    <div class="task-list-h">📝 আপনার একটিভ প্ল্যান সমূহ</div>
    <div id="taskList">
      <div class="card" style="text-align:center; padding:30px;">
        <div style="color:var(--t3);">লোডিং হচ্ছে...</div>
      </div>
    </div>

    <div style="margin-top: 25px; margin-bottom: 30px;">
      <button id="collectBtn" class="collect-btn" onclick="runCollect()">
        💰 ইনকাম সংগ্রহ করুন
      </button>
      <div style="text-align:center; font-size:11px; color:var(--t3); margin-top:12px; line-height:1.5;">
        প্রতি ২৪ ঘণ্টায় একবার আপনার সকল প্ল্যান থেকে ইনকাম সংগ্রহ করতে পারবেন।
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bnav">
    <a href="dashboard.html" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      হোম
    </a>
    <a href="plans.html" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
      প্ল্যান
    </a>
    <a href="task.html" class="bnav-item on">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
      টাস্ক
    </a>
    <a href="refer.html" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg></div>
      রেফার
    </a>
    <a href="withdraw.html" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
      উত্তোলন
    </a>
    <a href="profile.html" class="bnav-item">
      <div class="bnav-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      প্রোফাইল
    </a>
  </div>

  <div id="toast"></div>

  <script src="script.js"></script>
  <script>
    checkAuth();

    function updateTaskUI() {
      const cont = document.getElementById('taskList');
      if (!S.user) return;

      const plans = S.user.active_plans || [];
      if (plans.length === 0 && !S.user.plan) {
        cont.innerHTML = `
          <div class="card" style="text-align:center; padding:40px 20px;">
            <div style="font-size:40px; margin-bottom:10px;">📦</div>
            <div style="font-weight:700; color:var(--text);">কোনো একটিভ প্ল্যান নেই</div>
            <a href="plans.html" class="btn btn-primary" style="margin-top:15px; padding:10px 20px;">প্ল্যান কিনুন</a>
          </div>
        `;
        document.getElementById('collectBtn').disabled = true;
        return;
      }

      cont.innerHTML = plans.map(p => `
        <div class="task-item">
          <div style="display:flex; align-items:center; gap:12px;">
            <div class="task-ico">📦</div>
            <div>
              <div style="font-weight:800; color:var(--text); font-size:15px;">${p.name}</div>
              <div style="font-size:11px; color:var(--t3);">বাকি: ${p.rem || p.days} দিন</div>
            </div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:10px; color:var(--t3);">আজকের আয়</div>
            <div style="font-weight:800; color:var(--green); font-size:16px;">৳${p.daily}</div>
          </div>
        </div>
      `).join('');

      // Update Button Status
      const can = canCollect();
      const btn = document.getElementById('collectBtn');
      if (can) {
        btn.disabled = false;
        btn.innerHTML = '💰 ইনকাম সংগ্রহ করুন';
        document.getElementById('timerStatus').textContent = 'কালেকশন এখন চালু';
        document.getElementById('mainTimer').textContent = 'READY';
        document.getElementById('mainTimer').style.color = '#4ade80';
      } else {
        btn.disabled = true;
        btn.innerHTML = '✅ আজকের টাস্ক শেষ';
        document.getElementById('timerStatus').textContent = 'পরবর্তী কালেকশন বাকি';
        document.getElementById('mainTimer').style.color = '#fff';
        startTimer();
      }
    }

    let tIntv;
    function startTimer() {
      if(tIntv) clearInterval(tIntv);
      tIntv = setInterval(() => {
        if (!S.user || !S.user.last_collect) return;
        
        let last;
        if (S.user.last_collect.seconds) last = new Date(S.user.last_collect.seconds * 1000);
        else if (S.user.last_collect.toDate) last = S.user.last_collect.toDate();
        else last = new Date(S.user.last_collect);

        const next = new Date(last.getTime() + 24 * 60 * 60 * 1000);
        const diff = next - new Date();

        if (diff <= 0) {
          clearInterval(tIntv);
          updateTaskUI();
        } else {
          const h = Math.floor(diff / 3600000);
          const m = Math.floor((diff % 3600000) / 60000);
          const s = Math.floor((diff % 60000) / 1000);
          document.getElementById('mainTimer').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }
      }, 1000);
    }

    async function runCollect() {
      const btn = document.getElementById('collectBtn');
      btn.disabled = true;
      btn.innerHTML = '⏳ প্রসেসিং...';
      await collectDaily();
      updateTaskUI();
    }

    const oldUI = updateUI;
    updateUI = function() {
      oldUI();
      updateTaskUI();
    }
  </script>
</body>
</html>
