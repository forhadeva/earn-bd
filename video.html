<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>EarnBD - ভিডিও দেখে আয়</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://quge5.com/88/tag.min.js" data-zone="237738" async data-cfasync="false"></script>
</head>
<body>
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tbar-logo" onclick="window.location.href='dashboard.html'" style="cursor:pointer;">Earn<span>BD</span></div>
    <div class="tbar-right">
      <div class="tbar-bal">৳<span id="hBal">0</span></div>
      <div class="tbar-avatar" id="avt">U</div>
    </div>
  </div>

  <div class="page">
    <div class="ph" style="display:flex; align-items:center; gap:15px;">
      <div onclick="window.location.href='dashboard.html'" style="width:36px; height:36px; border-radius:10px; background:#fff; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:var(--sh);">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
      </div>
      <div>
        <div class="ph-title">ভিডিও দেখে আয়</div>
        <div class="ph-sub">প্রতিটি ভিডিওর জন্য বোনাস পান</div>
      </div>
    </div>

    <div id="videoTasks">
      <!-- Tasks will be generated here -->
      <div class="card" style="text-align:center; padding:30px;">
        <div style="color:var(--t3);">টাস্ক লোড হচ্ছে...</div>
      </div>
    </div>

    <!-- Ad Reset Section -->
    <div id="adResetSec" style="display:none; margin:20px 0; padding:15px; border:2px dashed var(--b200); border-radius:16px; background:#fff; text-align:center;">
      <div style="font-size:13px; font-weight:700; color:var(--text); margin-bottom:10px;">সব ভিডিও দেখা শেষ? রিসেট করুন!</div>
      <div onclick="resetVideoLimits()" style="width:100%; min-height:80px; background:linear-gradient(45deg, #f3f4f6, #e5e7eb); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden;">
        <script src="https://quge5.com/88/tag.min.js" data-zone="237738" async data-cfasync="false"></script>
        <div style="font-weight:800; color:var(--b700);">রিসেট করতে এখানে ক্লিক করুন</div>
      </div>
    </div>
  </div>

  <!-- Video Player Modal Overlay -->
  <div id="vOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; flex-direction:column; align-items:center; justify-content:center; color:#fff; padding:20px;">
    <div style="font-size:60px; margin-bottom:20px;">🎥</div>
    <div style="font-size:18px; font-weight:800; margin-bottom:10px;">অ্যাড লোড হচ্ছে...</div>
    <div style="font-size:40px; font-weight:900; color:var(--b400);" id="vTimer">15</div>
    <div style="font-size:12px; color:#ccc; margin-top:10px;">দয়া করে অপেক্ষা করুন, ভিডিওটি শেষ না হওয়া পর্যন্ত বের হবেন না।</div>
    <div style="margin-top:20px; font-size:11px; background:rgba(255,255,255,0.1); padding:10px; border-radius:8px; text-align:center;">
        বিজ্ঞাপনে ক্লিক করলে বোনাস নিশ্চিত হবে!
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    checkAuth();
    let isWatching = false;

    window.onload = () => {
      setTimeout(() => {
        generateTasks();
        updateTaskStatus();
      }, 1000);
    };

    function generateTasks() {
        const cont = document.getElementById('videoTasks');
        let html = '';
        for(let i=1; i<=50; i++) {
            html += `
              <div class="card" style="padding:20px; margin-bottom:15px; display:flex; align-items:center; justify-content:space-between;" id="task-card-${i}">
                <div style="display:flex; align-items:center; gap:15px;">
                  <div style="width:45px; height:45px; background:var(--b50); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px;">🎬</div>
                  <div>
                    <div style="font-weight:800; font-size:15px; color:var(--text);">ভিডিও টাস্ক - ${i}</div>
                    <div style="font-size:11px; color:var(--green); font-weight:700;">বোনাস: ৳২</div>
                  </div>
                </div>
                <button class="btn btn-primary btn-sm" onclick="startVideoTask(${i}, 2, this)" style="padding:8px 15px; font-size:12px;">শুরু করুন</button>
              </div>
            `;
        }
        cont.innerHTML = html;
    }

    function updateTaskStatus() {
      if(!S.user) return;
      const tasks = S.user.completed_videos || [];
      const now = Date.now();
      const taskCount = 50;
      let doneCount = 0;
      
      for(let i=1; i<=taskCount; i++) {
        const btn = document.querySelector(`#task-card-${i} button`);
        if(!btn) continue;
        const taskData = tasks.find(t => t.id === i);
        
        if(taskData) {
          const lastTime = taskData.time.seconds ? taskData.time.seconds * 1000 : taskData.time;
          if(now - lastTime < 24 * 60 * 60 * 1000) {
            btn.textContent = 'সম্পন্ন ✅';
            btn.disabled = true;
            btn.style.background = '#f3f4f6';
            btn.style.color = '#9ca3af';
            btn.style.border = 'none';
            doneCount++;
          }
        }
      }

      if(doneCount >= taskCount) document.getElementById('adResetSec').style.display = 'block';
    }

    async function startVideoTask(id, amt, btn) {
      if(isWatching) return;
      isWatching = true;
      
      const overlay = document.getElementById('vOverlay');
      const timerEl = document.getElementById('vTimer');
      overlay.style.display = 'flex';
      
      // Monetag MultiTag often triggers on any user interaction
      // We can also use a Direct Link here if you have one
      // For now, it will trigger the MultiTag when the user interacts with the page
      
      let timeLeft = 15;
      const timer = setInterval(async () => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        
        if(timeLeft <= 0) {
          clearInterval(timer);
          overlay.style.display = 'none';
          isWatching = false;
          
          await completeTask(id, amt);
        }
      }, 1000);
    }

    async function completeTask(id, amt) {
      if(!auth.currentUser) return;
      const uid = auth.currentUser.uid;
      
      try {
        let completed = S.user.completed_videos || [];
        const idx = completed.findIndex(t => t.id === id);
        const taskObj = { id, time: Date.now() };
        
        if(idx > -1) completed[idx] = taskObj;
        else completed.push(taskObj);

        const batch = db.batch();
        const userRef = db.collection('users').doc(uid);
        batch.update(userRef, {
          bal: firebase.firestore.FieldValue.increment(amt),
          completed_videos: completed
        });

        const histRef = db.collection('history').doc();
        batch.set(histRef, {
          uid, amt, msg: `ভিডিও টাস্ক - ${id}`, type_sub: "video",
          date: new Date().toLocaleString('bn-BD'), timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        await batch.commit();
        toast(`🎉 আপনি ৳${amt} বোনাস পেয়েছেন!`);
        // We don't reload the whole page to keep the list position
        // Instead we just update the specific button
        updateTaskStatus(); 
      } catch(e) {
        console.error(e);
        toast("❌ ভুল হয়েছে!");
      }
    }

    async function resetVideoLimits() {
      if(!auth.currentUser) return;
      try {
        await db.collection('users').doc(auth.currentUser.uid).update({
          completed_videos: []
        });
        toast("✅ সব ভিডিও টাস্ক রিসেট হয়েছে!");
        setTimeout(() => window.location.reload(), 1000);
      } catch(e) { console.error(e); }
    }
  </script>
</body>
</html>
