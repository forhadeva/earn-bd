<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>EarnBD - Withdraw</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tbar-logo">Earn<span>BD</span></div>
    <div class="tbar-right">
      <div class="tbar-bal">৳<span id="hBal">0</span></div>
      <div class="tbar-avatar" id="avt" onclick="window.location.href='profile.html'">U</div>
    </div>
  </div>

  <div class="page">
    <div class="ph">
      <div class="ph-title">Withdraw Balance</div>
      <div class="ph-sub">Cash out your earnings securely</div>
    </div>

    <!-- BALANCE HERO -->
    <div class="hero">
      <div class="hero-grid"></div><div class="hero-orb"></div>
      <div class="hero-lbl">Available Balance</div>
      <div class="hero-amt"><sup>৳</sup><span id="hBalLarge">0</span></div>
      <div id="minWdLbl" style="font-size:12px;color:rgba(255,255,255,.6);margin-top:8px;">Min Withdraw: ৳50</div>
    </div>

    <!-- FORM CARD -->
    <div class="card" style="padding:22px;">
      <div class="field">
        <label>Payment Method</label>
        <select id="wdMethod" class="inp" style="appearance:none; background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%231a50db%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 14px center; background-size: 12px; padding-right: 30px;">
          <option>bKash</option>
          <option>Nagad</option>
          <option>Rocket</option>
        </select>
      </div>
      <div class="field">
        <label>Account Number / ID</label>
        <input id="wdPhone" class="inp" type="tel" placeholder="e.g. 01XXXXXXXXX">
      </div>
      <div class="field">
        <label>Amount (৳)</label>
        <input id="wdAmt" class="inp" type="number" placeholder="Enter amount">
      </div>
      <button class="btn btn-primary" style="margin-top:10px; width:100%; border-radius:14px; height:52px;" onclick="submitWithdraw()">
        🚀 Confirm Withdraw →
      </button>
    </div>

    <!-- HISTORY SECTION -->
    <div class="sec-h" style="margin-top:24px;">
      <div class="sec-title">🕒 Withdrawal History</div>
    </div>
    <div class="card" style="margin-bottom:30px; min-height:100px;">
      <div id="wdHist" class="empty">
        <div class="empty-ico">💸</div>
        <div class="empty-txt">No withdrawals found</div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bnav">
    <a href="dashboard.html" class="bnav-item">
      <div class="bnav-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      Home
    </a>
    <a href="plans.html" class="bnav-item">
      <div class="bnav-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
      Plans
    </a>
    <a href="refer.html" class="bnav-item">
      <div class="bnav-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg></div>
      Refer
    </a>
    <a href="withdraw.html" class="bnav-item on">
      <div class="bnav-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
      Withdraw
    </a>
    <a href="profile.html" class="bnav-item">
      <div class="bnav-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      Profile
    </a>
  </div>

  <div id="toast"></div>

  <script src="script.js"></script>
  <script>
    checkAuth();
    
    // Sync Bal to Large Hero Amount
    const observer = new MutationObserver(() => {
      const bLarge = document.getElementById('hBalLarge');
      const bSmall = document.getElementById('hBal');
      if(bLarge && bSmall) bLarge.innerText = bSmall.innerText;
    });
    observer.observe(document.getElementById('hBal'), { childList: true, characterData: true, subtree: true });

    let minAmt = 500;
    let reqRefs = 0;
    let currentStep = 1;

    function updateWdRules() {
      if (!S.user) return;
      const count = S.user.wdCount || 0;
      const refs = S.user.refCount || 0;

      if (count === 0) {
        minAmt = 50;
        reqRefs = 0;
        currentStep = 1;
      } else if (count === 1) {
        minAmt = 300;
        reqRefs = 5;
        currentStep = 2;
      } else {
        minAmt = 500;
        reqRefs = 0;
        currentStep = 3;
      }

      // Update UI
      const minLbl = document.getElementById('minWdLbl');
      const amtInp = document.getElementById('wdAmt');
      if (minLbl) minLbl.innerText = `Min Withdraw: ৳${minAmt}${reqRefs > 0 ? ` (Required Refs: ${reqRefs})` : ''}`;
      if (amtInp) amtInp.placeholder = `Min ৳${minAmt}`;
    }

    async function submitWithdraw() {
      const method = document.getElementById('wdMethod').value;
      const address = document.getElementById('wdPhone').value.trim();
      const amtStr = document.getElementById('wdAmt').value;
      const amt = parseInt(amtStr);
      const userRefs = S.user.refCount || 0;

      if (!amt || amt < minAmt) { 
        toast(`⚠️ In your current step, min withdraw is ৳${minAmt}`); 
        return; 
      }
      if (reqRefs > 0 && userRefs < reqRefs) {
        toast(`🔒 2nd withdraw requires at least ${reqRefs} active referrals (You have ${userRefs})`);
        return;
      }
      if (!address) { toast('⚠️ Please enter account number or ID'); return; }
      if ((S.user.bal || 0) < amt) { toast('❌ Insufficient balance'); return; }

      const ok = await confirmModal('Confirm Withdraw', `Are you sure you want to withdraw ৳${amt} to ${method}?`);
      if (!ok) return;

      try {
        const userRef = db.collection('users').doc(auth.currentUser.uid);
        await userRef.update({ 
          bal: S.user.bal - amt,
          wdCount: firebase.firestore.FieldValue.increment(1)
        });
        
        await db.collection('withdraws').add({
          uid: auth.currentUser.uid,
          name: S.user.name,
          phone: S.user.phone || 'N/A',
          method,
          address,
          amt,
          status: 'pending',
          date: new Date().toLocaleString('en-US'),
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        toast('✅ Request submitted successfully!');
        document.getElementById('wdPhone').value = '';
        document.getElementById('wdAmt').value = '';
        S.user.bal -= amt;
        S.user.wdCount = (S.user.wdCount || 0) + 1;
        updateUI();
      } catch(e) { toast('❌ Error: ' + e.message); }
    }

    async function renderWdHist() {
      if(!auth.currentUser) return;
      try {
        const snap = await db.collection('withdraws').where('uid', '==', auth.currentUser.uid).get();
        const cont = document.getElementById('wdHist');
        
        if(snap.empty) {
          cont.innerHTML = `<div class="empty-ico">💸</div><div class="empty-txt">No withdrawals found</div>`;
          cont.classList.add('empty');
          return;
        }

        const docs = snap.docs.map(d => ({id: d.id, ...d.data()}));
        docs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

        cont.classList.remove('empty');
        cont.innerHTML = docs.map(d => {
          const sColor = d.status === 'pending' ? 'var(--amber)' : (d.status === 'success' ? 'var(--green)' : 'var(--red)');
          const sText = d.status === 'pending' ? 'Pending' : (d.status === 'success' ? 'Success' : 'Rejected');
          
          return `
            <div class="hist-row">
              <div style="display:flex; align-items:center;">
                <div class="hist-ico" style="background:var(--b50);">💰</div>
                <div>
                  <div style="font-weight:700; color:var(--text); font-size:15px;">৳${d.amt} (${d.method})</div>
                  <div class="hist-meta">${d.address} • ${d.date}</div>
                </div>
              </div>
              <span class="badge" style="background:${sColor}20; color:${sColor};">${sText}</span>
            </div>
          `;
        }).join('');
      } catch(e) { console.error(e); }
    }

    const oldUpdateUI = updateUI;
    updateUI = function() {
      oldUpdateUI();
      updateWdRules();
      renderWdHist();
    }
  </script>
</body>
</html>
